{% extends "admin_base.html" %} 
{% block title %}Add Color Product{%endblock %} 
{% block content %}
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
  crossorigin="anonymous"
></script>
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;" >
  <symbol id="save" viewBox="0 0 16 16" fill="currentColor">
    <path d="M0 1.5A1.5 1.5 0 0 1 1.5 0H3v5.5A1.5 1.5 0 0 0 4.5 7h7A1.5 1.5 0 0 0 13 5.5V0h.086a1.5 1.5 0 0 1 1.06.44l1.415 1.414A1.5 1.5 0 0 1 16 2.914V14.5a1.5 1.5 0 0 1-1.5 1.5H14v-5.5A1.5 1.5 0 0 0 12.5 9h-9A1.5 1.5 0 0 0 2 10.5V16h-.5A1.5 1.5 0 0 1 0 14.5z"/>
  <path d="M3 16h10v-5.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5zm9-16H4v5.5a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5zM9 1h2v4H9z"/>
  </symbol>
  <symbol id="back" viewBox="0 0 16 16" fill="currentColor">
    <path d="M.5 3.5A.5.5 0 0 0 0 4v8a.5.5 0 0 0 1 0V8.753l6.267 3.636c.54.313 1.233-.066 1.233-.697v-2.94l6.267 3.636c.54.314 1.233-.065 1.233-.696V4.308c0-.63-.693-1.01-1.233-.696L8.5 7.248v-2.94c0-.63-.692-1.01-1.233-.696L1 7.248V4a.5.5 0 0 0-.5-.5"/>
  </symbol>
  <symbol id="warning" viewBox="0 0 16 16" fill="currentColor">
    <path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.15.15 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.2.2 0 0 1-.054.06.1.1 0 0 1-.066.017H1.146a.1.1 0 0 1-.066-.017.2.2 0 0 1-.054-.06.18.18 0 0 1 .002-.183L7.884 2.073a.15.15 0 0 1 .054-.057m1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767z"/>
    <path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0M7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z"/>
  </symbol>
</svg>

<style>
#terms-table {
    border-collapse: collapse; /* Merges borders into a single line */
    margin: 25px 0;
    font-size: 0.9em;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-width: 400px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    border-radius: 8px 8px 0 0;
    overflow: hidden; /* Ensures rounded corners show */
}

#terms-table thead tr {
    /* background-color: #009879;  Modern teal color */
    background-color: #060303; 
    color: #ffffff;
    text-align: left;
    font-weight: bold;
}

#terms-table th, 
#terms-table td {
    padding: 12px 15px; /* Adds breathing room */
}

#terms-table tbody tr {
    border-bottom: 1px solid #dddddd;
}

#terms-table tbody tr:nth-of-type(even) {
    /* background-color: #f3f3f3;  Zebra striping for readability */
}

#terms-table tbody tr:last-of-type {
    border-bottom: 2px solid #060303;
}

#terms-table tbody tr:hover {
    background-color: #f1f1f1; /* Subtle hover effect */
    cursor: pointer;
}

select {
  appearance: none; /* Remove default arrow */
  background-color: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px 40px 10px 15px; /* Extra right padding for arrow */
  font-size: 16px;
  cursor: pointer;
  background-image: url('custom-arrow.svg'); /* Path to your arrow icon */
  background-repeat: no-repeat;
  background-position: right 15px center;
}
</style>

<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 mt-4">
        <div class="card">
          <div class="card-header">
            <h2 class="fw">{{ product.name }}</h2>
          </div>
          <div class="card-body">
            <form action="" method="POST" enctype="multipart/form-data">
              {% csrf_token %}
              {% for msg in messages %}
                <div class="alert alert-success alert-dismissible d-flex align-items-center fade show" role="alert" >
                  <svg class="bi flex-shrink-0 me-2" role="img" aria-label="Success:" width="20" height="20" >
                    <use xlink:href="#warning" />
                  </svg>
                  <div>{{ msg }}</div>
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" ></button>
                </div>
              {% endfor %}
              <div class="mb-3">
                <label for="" class="form-label">Image</label>
                <input type="file" name="image" class="form-control" />
              </div>
              <div class="mb-3">
                <label for="" class="form-label">Item Name</label>
                <input type="text" name="itemName" class="form-control" />
              </div>
              <div class="mb-3">
                <label for="" class="form-label">Description</label>
                <input type="text" name="description" class="form-control" />
              </div>
              
              <div class="mb-3">
                <label for="" class="form-label">Original Price</label>
                <input type="text" name="original_price" class="form-control" />
              </div>
              <div class="mb-3">
                <label for="" class="form-label">Selling Price</label>
                <input type="text" name="selling_price" class="form-control" />
              </div>
              <div class="mb-3">
                <label for="" class="form-label">Image 1</label>
                <input type="file" name="image1" class="form-control" />
              </div>
              <div class="mb-3">
                <label for="" class="form-label">Image 2</label>
                <input type="file" name="image2" class="form-control" />
              </div>
              <div class="mb-3">
                <label for="" class="form-label">Image 3</label>
                <input type="file" name="image3" class="form-control" />
              </div>
              <div class="mb-3">
                <label for="" class="form-label">Image 4</label>
                <input type="file" name="image4" class="form-control" />
              </div>
              <!--dropdown for Size-->
              <div class="mb-3 col">
                <div class="row">
                  <label for="size-select" class="form-label">Choose a Size:</label>
                </div>
                <div class="row" class="form-control ms-2" style="width: 685px;" >
                  <select id="size-select" style="width: 685px; margin-left: 10px;">
                    <option value="" >Select size</option>
                    {% for size in sizes %}
                      <option value="{{ size.id }}">
                        {{ size.name }}
                      </option>
                    {% endfor %}
                  </select>
                </div>
                <div id="terms-container" style="margin-top: 20px; position: center;">
                  <table id="terms-table" border="1" style="width: 100%; border-collapse: collapse;">
                    <thead>
                      <tr>
                        <th>Acronym</th>
                        <th>Description</th>
                      </tr>
                    </thead>
                    <tbody id="terms-list">
                    </tbody>
                  </table>
                </div>
              </div>  
              <!--Buttons Below-->
              <button type="submit" class="btn btn-primary">
                <svg class="bi m-1" width="15" height="15">
                  <use xlink:href="#save"><!--Save--></use>
                </svg>
                Save
              </button>

              <a href="{% url 'manage-item' product.id %}" class="btn btn-dark">
                <svg class="bi m-1" width="15" height="15">
                  <use xlink:href="#back"><!--Back--></use>
                </svg>
                Back
              </a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const sizeSelect = document.getElementById('size-select');
  const termsList = document.getElementById('terms-list');

  if (sizeSelect) {
    sizeSelect.addEventListener('change', function() {
      const sizeId = this.value;
      termsList.innerHTML = ''; // Clear previous results

      if (sizeId) {
        fetch(`/adminpage/get-size-term/?size_id=${sizeId}`)
          .then(response => response.json())
          .then(data => {
            if (data.terms.length > 0) {
              data.terms.forEach(term => {
                let tr = document.createElement('tr');

                let td1 = document.createElement('td');
                td1.textContent = Array.isArray(term) ? term[0] : '';
                tr.appendChild(td1);

                let td2 = document.createElement('td');
                td2.textContent = Array.isArray(term) ? term[1] : '';
                tr.appendChild(td2);

                termsList.appendChild(tr);
              });
            } else {
              termsList.innerHTML = '<tr><td colspan="2">No terms found for this size.</td></tr>';
            }
          });
      } else {
        termsList.innerHTML = '<tr><td colspan="2">Select a size to see terms</td></tr>';
      }
    });
  }
});

</script>

{% endblock %}
