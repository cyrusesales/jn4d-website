<style>

    left: auto;
    right: 0;

    padding-left: 12px !important;

<section class="section">
  <div class="container">
    <div class="row justify-content-center" style="margin-top: 80px; margin-bottom: 50px">
      <div class="col-md-8 mt-5">
        <div class="card">
          <div class="card-header">
            <h3 class="fw">User Profile</h3>
          </div>
          {% for msg in messages %}
            <div class="alert alert-danger alert-dismissible d-flex align-items-center fade show" role="alert" >
              <svg class="bi flex-shrink-0 me-2" role="img" aria-label="Success:" width="20" height="20" >
                <use xlink:href="#check-circle-fill" />
              </svg>
              <div>{{ msg }}</div>
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" ></button>
            </div>
          {% endfor %}
          <div class="card-body">
            <form action="" method="POST" enctype="multipart/form-data">
              {% csrf_token %}

              <div class="form mb-3">
                <label class="" for="" style="text: bold;">Username</label>
                <input type="text" name="username" class="form-control" value="{{ user.username }}" style="background-color: white;">
              </div>
              <div class="form mb-3">
                <label class="" for="" style="text: bold;">First Name</label>
                <input type="text" name="firstName" class="form-control" value="{{ userprofile.firstName }}" style="background-color: white;">
              </div>
              <div class="form mb-3">
                <label class="" for="" style="text: bold;">Last Name</label>
                <input type="text" name="lastName" class="form-control" value="{{ userprofile.lastName }}" style="background-color: white;">
              </div>
              <div class="form mb-3">
                <label class="" for="" style="text: bold;">Email Address</label>
                <input type="text" name="email" class="form-control" value="{{ userprofile.email }}" style="background-color: white;">
              </div>
              
              <div class="form mb-3">
                <label class="" for="" style="text: bold;">Date of Birth</label>
                <input type="date" name="dateOfBirth" class="form-control" value="{{ userprofile.dateOfBirth | date:'Y-m-d' }}" style="background-color: white;">
              </div>
              <div class="form mb-3">
                <label class="" for="" style="text: bold;">Phone Number</label>
                <input type="text" name="phoneNumber" class="form-control" value="{{ userprofile.phoneNumber }}" style="background-color: white;">
              </div>
              <br>
              <br>
              <br>

              <!--Buttons Below-->
              <button type="submit" class="btn btn-primary">
                <svg class="bi m-1" width="15" height="15" style="color: white;">
                  <use xlink:href="#save"><!--Save--></use>
                </svg>
                Save
              </button>
              <a type="submit" href="{% url "change-password" user.id %}" class="btn btn-danger">
                <svg class="bi m-1" width="15" height="15" style="color: white;">
                  <use xlink:href="#password"><!--Save--></use>
                </svg>
                Change Password
              </a>

              <a type="submit" href="{% url "view-user-profile" user.id %}" class="btn btn-dark">
                <svg class="bi m-1" width="15" height="15" style="color: white;">
                    <use xlink:href="#back"></use>
                </svg>
                Back
              </a>
  
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>





{% if messages %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
      var modal = new bootstrap.Modal(document.getElementById("messageModal"));
      modal.show();
  });
</script>
{% endif %} 


<script>
//Password Input
function myFunction(){
    var x = document.getElementById("password");
    if (x.type === "password"){
        x.type = "text";
    } else {
        x.type = "password";
    }
}

//Phone Number Input
const phoneInput = document.querySelector("#phone");
const hiddenPhone = document.querySelector("#full_phone");

const iti = window.intlTelInput(phoneInput, {
    separateDialCode: true,
    initialCountry: "ph",
    preferredCountries: ["ph"],

    autoPlaceholder: "off",


    utilsScript:
      "https://cdn.jsdelivr.net/npm/intl-tel-input@18.5.2/build/js/utils.js",
});

// force dropdown right
phoneInput.closest(".mb-3")
    .querySelector(".iti")
    .classList.add("iti--right");

function normalizePHNumber(){
    const country = iti.getSelectedCountryData().iso2;

    if (country === "ph" && !phoneInput.value.startsWith("9")){
        //phoneInput.value = phoneInput.value.replace(/^0+/, '')
        phoneInput.classList.add("is-invalid");
        return;
    }
}

// validate live
const validatePhone = () => {
    normalizePHNumber();

    if (phoneInput.value.trim() === "") {
        phoneInput.classList.remove("is-valid", "is-invalid");
        hiddenPhone.value = "";
        return;
    }

    if (iti.isValidNumber()) {
        phoneInput.classList.add("is-valid");
        phoneInput.classList.remove("is-invalid");
        hiddenPhone.value = iti.getNumber(); // E.164
    } else {
        phoneInput.classList.add("is-invalid");
        phoneInput.classList.remove("is-valid");
        hiddenPhone.value = "";
    }
};

//phoneInput.addEventListener("keyup", validatePhone);
//phoneInput.addEventListener("blur", validatePhone);
phoneInput.addEventListener("input", validatePhone);
phoneInput.addEventListener("countrychange", validatePhone);
</script>
